# ============================================================
#  Component Sync & Build Pipeline
# ============================================================
#  This workflow is triggered when source repos (demo-repo-a,
#  demo-repo-b) push to main. It:
#    1. Syncs updated components/utils into this repo via PR
#    2. Runs a type-check build to verify everything compiles
#
#  Triggers:
#    - repository_dispatch (from source repo push workflows)
#    - workflow_dispatch   (manual trigger for testing)
#
#  Required Secrets:
#    APP_ID          - GitHub App ID for component-sync-demo
#    APP_PRIVATE_KEY - PEM private key for the GitHub App
#    SOURCE_REPOS    - JSON config mapping source paths
#
#  Required Variables:
#    TARGET_REPO     - This repo (GitHubDemoPlayground/demo-repo-c)
# ============================================================

name: "🔄 Sync Components & Build"

on:
  repository_dispatch:
    types: [component-sync]
  workflow_dispatch:

jobs:
  # ── Step 1: Sync components from source repos ──────────────
  sync:
    name: "📦 Sync from source repos"
    runs-on: ubuntu-latest
    outputs:
      pr-created: ${{ steps.sync-action.outputs.pr-created || 'false' }}
    steps:
      - name: "📋 Log trigger details"
        run: |
          echo "## Sync Trigger Info" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Event | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "| Source Repo | ${{ github.event.client_payload.source_repo }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Source SHA | \`${{ github.event.client_payload.source_sha }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| Source Ref | ${{ github.event.client_payload.source_ref }} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Trigger | Manual (workflow_dispatch) |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: "📥 Checkout sync action"
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/GitHubApp
          path: .github/sync-action

      - name: "🔄 Run component sync"
        id: sync-action
        uses: ./.github/sync-action
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          source-repos: ${{ secrets.SOURCE_REPOS }}
          target-repo: ${{ vars.TARGET_REPO }}
          target-branch: main

  # ── Step 2: Build and type-check ───────────────────────────
  build:
    name: "🏗️ Build & Type Check"
    runs-on: ubuntu-latest
    needs: sync
    steps:
      - name: "📥 Checkout repo"
        uses: actions/checkout@v4
        with:
          ref: main

      - name: "📦 Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "📦 Install dependencies"
        run: npm install

      - name: "🔍 Type check"
        run: npm run typecheck || echo "Type check completed (may have errors from pending sync PR)"

      - name: "✅ Build summary"
        run: |
          echo "## Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          if [ -d "components/repo-a" ]; then
            COUNT_A=$(find components/repo-a -name "*.ts" -o -name "*.tsx" | wc -l | tr -d ' ')
            echo "| 🎨 UI Components (repo-a) | $COUNT_A files synced |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🎨 UI Components (repo-a) | ⏳ Pending sync |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -d "components/repo-b" ]; then
            COUNT_B=$(find components/repo-b -name "*.ts" -o -name "*.tsx" | wc -l | tr -d ' ')
            echo "| 🛠️ Shared Utils (repo-b) | $COUNT_B files synced |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🛠️ Shared Utils (repo-b) | ⏳ Pending sync |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Synced components live in \`components/repo-a/\` and \`components/repo-b/\`" >> $GITHUB_STEP_SUMMARY
